<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#ffffff" />
        <meta name="description" content="Gîte chez Martin" />
        <title>Gîte chez Martin</title>
        <link rel="preload" href="/fonts/PPEditorialNew-Regular.otf" as="font" type="font/otf" crossorigin />
        <link rel="preload" href="/fonts/PPEditorialNew-Ultrabold.otf" as="font" type="font/otf" crossorigin />
        <script>
            // Disable the browser's default scroll restoration so a refresh
            // mid-page doesn't leave us scrolled while the hero intro plays.
            // Must run before React mounts.
            if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
            window.scrollTo(0, 0);
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
